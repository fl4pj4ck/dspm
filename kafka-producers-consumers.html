<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kafka Topic Flow - Interactive Visualization</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      background: #0d1117;
      color: #c9d1d9;
      overflow: hidden;
    }
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      cursor: grab;
    }
    #canvas-container:active { cursor: grabbing; }
    #info-panel {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 340px;
      background: rgba(22, 27, 34, 0.95);
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    #info-panel h2 { font-size: 14px; color: #58a6ff; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #30363d; }
    #info-panel .section { margin-bottom: 12px; font-size: 12px; }
    #info-panel .section-title { color: #8b949e; margin-bottom: 4px; font-size: 11px; text-transform: uppercase; }
    #info-panel .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
    #info-panel .node-tag {
      padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer;
    }
    #info-panel .node-tag.produces { background: rgba(34, 197, 94, 0.25); color: #4ade80; border: 1px solid #22c55e; }
    #info-panel .node-tag.consumes { background: rgba(14, 165, 233, 0.25); color: #38bdf8; border: 1px solid #0ea5e9; }
    #info-panel .node-tag.selected { background: rgba(245, 158, 11, 0.3); color: #fbbf24; border: 1px solid #f59e0b; }
    #info-panel .legend { margin-top: 12px; padding-top: 12px; border-top: 1px solid #30363d; font-size: 11px; color: #8b949e; }
    #info-panel .legend span { display: inline-block; margin-right: 12px; margin-bottom: 4px; }
    #info-panel .legend .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
    #instructions { position: fixed; bottom: 16px; left: 16px; font-size: 11px; color: #8b949e; z-index: 100; }
    #instructions kbd { background: #21262d; padding: 2px 6px; border-radius: 4px; border: 1px solid #30363d; }
    #node-list {
      position: fixed; top: 16px; right: 16px; width: 240px; max-height: calc(100vh - 80px);
      overflow-y: auto; background: rgba(22, 27, 34, 0.95); border: 1px solid #30363d;
      border-radius: 8px; padding: 12px; z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    #node-list h3 { font-size: 12px; color: #8b949e; margin-bottom: 10px; text-transform: uppercase; }
    #node-list .node-item {
      padding: 6px 10px; margin: 2px 0; border-radius: 4px; font-size: 11px; cursor: pointer; transition: background 0.15s;
    }
    #node-list .node-item:hover { background: #21262d; }
    #node-list .node-item.active { background: rgba(245, 158, 11, 0.25); color: #fbbf24; }
    #node-list .node-item.service::before { content: '● '; color: #8b5cf6; }
    #node-list .node-item.topic::before { content: '◆ '; color: #22c55e; }
    .node-label {
      font-size: 10px; font-weight: 500; color: #e2e8f0; text-shadow: 0 1px 2px rgba(0,0,0,0.8);
      white-space: nowrap; pointer-events: none; user-select: none;
    }
    .controls-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .toggle-switch { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #8b949e; cursor: pointer; }
    .toggle-switch input { accent-color: #0ea5e9; cursor: pointer; }
    .filter-tabs { display: flex; gap: 4px; margin-bottom: 8px; }
    .filter-tabs button { font-size: 10px; padding: 4px 8px; background: #21262d; border: 1px solid #30363d; color: #8b949e; border-radius: 4px; cursor: pointer; }
    .filter-tabs button.active { background: #30363d; color: #c9d1d9; }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="info-panel">
    <h2>Kafka Topic Flow</h2>
    <p style="font-size: 11px; color: #8b949e; margin-bottom: 8px;">Click a service or topic to see producers and consumers</p>
    <div class="controls-row">
      <button id="clear-btn" style="font-size: 11px; padding: 4px 10px; background: #21262d; border: 1px solid #30363d; color: #8b949e; border-radius: 4px; cursor: pointer;">Clear</button>
      <label class="toggle-switch"><input type="checkbox" id="auto-rotate-toggle" checked> Auto-rotate</label>
    </div>
    <div id="selection-info">
      <div class="section">
        <div class="section-title">Selected</div>
        <div id="selected-name">—</div>
      </div>
      <div class="section">
        <div class="section-title">Produces to (writes)</div>
        <div id="produces-list" class="tag-list">—</div>
      </div>
      <div class="section">
        <div class="section-title">Consumes from (reads)</div>
        <div id="consumes-list" class="tag-list">—</div>
      </div>
      <div class="legend">
        <span><span class="dot" style="background:#f59e0b"></span> Selected</span>
        <span><span class="dot" style="background:#22c55e"></span> Produces</span>
        <span><span class="dot" style="background:#0ea5e9"></span> Consumes</span>
      </div>
    </div>
  </div>
  <div id="node-list">
    <h3>Services & Topics</h3>
    <div class="filter-tabs">
      <button id="filter-all" class="active">All</button>
      <button id="filter-services">Services</button>
      <button id="filter-topics">Topics</button>
    </div>
    <div id="node-items"></div>
  </div>
  <div id="instructions">
    <kbd>Drag</kbd> rotate · <kbd>Scroll</kbd> zoom · <kbd>Click</kbd> node or list · ● Service · ◆ Topic
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.129.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.129.0/examples/js/controls/OrbitControls.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.129.0/examples/js/renderers/CSS2DRenderer.js"></script>
  <script>
    // Service -> topics it produces to
    const PRODUCERS = {
      'scan-manager': ['connector-notification', 'connector-notification-detail-event', 'connector-notification-subscription-event', 'connector-notification-detail-extended-event', 'connector-iam-full-trustee-event', 'connector-iam-notification-detail-event', 'containers', 'scan-tracking', 'files', 'files-change', 'files-streaming', 'scan-detail-update', 'sm-scan-requests', 'trustee-events', 'trustee-discovery', 'trustees-v2', 'file-audit-log', 'mt_requests', 'mt_responses'],
      'scan-data-manager': ['file-classification-result', 'file-audit-log', 'files-reclassify', 'remediation-request'],
      'gv-pipeline-classification': ['text-classification-result', 'file-cataloging-result-file-dto', 'file-audit-log'],
      'webhook-manager': ['connector-notification-detail-event', 'email-delivery-requested-v1', 'notification-manager-internal-v1'],
      'agent-edge': ['agentHeartBeat', 'text', 'userAction', 'agent-activity-otlp', 'mt_requests', 'mt_responses'],
      'regex-service': ['detectors-event-sourcing'],
      'keycloak': ['keycloak-event-admin', 'keycloak-event-user'],
      'dataguard': ['data-asset-events'],
      'connector-generic': ['containers', 'files', 'emails', 'files-streaming', 'emails-streaming'],
      'ocr-service': ['file-classify-ready'],
      'data-discoverer': ['catalogued-db', 'catalogued-db-entities']
    };

    // Service -> topics it consumes from
    const CONSUMERS = {
      'scan-manager': ['mt_requests', 'mt_responses', 'connector-notification', 'connector-notification-subscription-event', 'connector-iam-notification-detail-event', 'containers', 'scan-tracking', 'sm-scan-requests', 'scan-detail-update', 'remediation-request', 'connector-notification-detail-event'],
      'scan-data-manager': ['data-asset-events', 'files-change', 'file-classification-result', 'keycloak-event-admin', 'keycloak-event-user', 'remediation-request', 'file-cataloging-result-file-dto', 'file-audit-log'],
      'gv-pipeline-classification': ['text', 'files', 'files-reclassify', 'files-streaming', 'scan-detail-update', 'file-cataloging-result-file-dto', 'file-classify-ready', 'catalogued-db-entities'],
      'trustees-management': ['files-change', 'trustee-events', 'trustee-discovery', 'trustees-v2', 'connector-iam-full-trustee-event'],
      'webhook-manager': ['connector-notification-detail-event', 'email-delivery-requested-v1', 'file-classification-result', 'notification-manager-internal-v1', 'remediation-request', 'trustees-v2', 'userAction'],
      'agent-edge': ['mt_requests', 'mt_responses', 'agentHeartBeat', 'agent-activity-otlp', 'text-classification-result', 'userAction', 'files-change', 'configuration-v3', 'connector-notification-detail-event', 'connector-notification-detail-extended-event'],
      'regex-service': ['detectors-event-sourcing', 'data-asset-events'],
      'structured-scan-data-manager': ['catalogued-db-entities', 'classified-db-entities'],
      'ocr-service': ['file-cataloging-result-file-dto'],
      'data-discoverer': ['databases']
    };

    // Build reverse maps: topic -> { producers: [], consumers: [] }
    function buildTopicMaps() {
      const topicProducers = {};
      const topicConsumers = {};
      for (const [svc, topics] of Object.entries(PRODUCERS)) {
        for (const t of topics) {
          if (!topicProducers[t]) topicProducers[t] = [];
          if (!topicProducers[t].includes(svc)) topicProducers[t].push(svc);
        }
      }
      for (const [svc, topics] of Object.entries(CONSUMERS)) {
        for (const t of topics) {
          if (!topicConsumers[t]) topicConsumers[t] = [];
          if (!topicConsumers[t].includes(svc)) topicConsumers[t].push(svc);
        }
      }
      return { topicProducers, topicConsumers };
    }

    const { topicProducers, topicConsumers } = buildTopicMaps();
    const ALL_SERVICES = [...new Set([...Object.keys(PRODUCERS), ...Object.keys(CONSUMERS)])].sort();
    const ALL_TOPICS = [...new Set([...Object.keys(topicProducers), ...Object.keys(topicConsumers)])].sort();
    const ALL_NODES = [...ALL_SERVICES.map(s => ({ id: s, type: 'service' })), ...ALL_TOPICS.map(t => ({ id: t, type: 'topic' }))];

    // Colors
    const COLORS = {
      serviceDefault: 0x8b5cf6,   // violet
      topicDefault: 0x22c55e,     // green
      selected: 0xf59e0b,
      produces: 0x22c55e,
      consumes: 0x0ea5e9,
      dimmed: 0x374151
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0d1117);
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 55);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;

    const labelRenderer = new THREE.CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.left = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.getElementById('canvas-container').appendChild(labelRenderer.domElement);

    const nodes = {};
    const edges = [];
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    // Layout: services on inner sphere, topics on outer
    function getNodePositions() {
      const positions = {};
      const svcCount = ALL_SERVICES.length;
      const topicCount = ALL_TOPICS.length;
      const rSvc = 14, rTopic = 22;
      for (let i = 0; i < svcCount; i++) {
        const phi = Math.acos(-1 + (2 * i) / Math.max(svcCount, 1));
        const theta = Math.sqrt(svcCount * Math.PI) * phi;
        positions[ALL_SERVICES[i]] = new THREE.Vector3(
          rSvc * Math.cos(theta) * Math.sin(phi),
          rSvc * Math.sin(theta) * Math.sin(phi),
          rSvc * Math.cos(phi)
        );
      }
      for (let i = 0; i < topicCount; i++) {
        const phi = Math.acos(-1 + (2 * i) / Math.max(topicCount, 1));
        const theta = Math.sqrt(topicCount * Math.PI) * phi;
        positions[ALL_TOPICS[i]] = new THREE.Vector3(
          rTopic * Math.cos(theta) * Math.sin(phi),
          rTopic * Math.sin(theta) * Math.sin(phi),
          rTopic * Math.cos(phi)
        );
      }
      return positions;
    }

    const positions = getNodePositions();

    function createNode(id, type) {
      const isService = type === 'service';
      const geometry = isService ? new THREE.SphereGeometry(0.7, 20, 20) : new THREE.BoxGeometry(0.6, 0.6, 0.6);
      const material = new THREE.MeshPhongMaterial({
        color: isService ? COLORS.serviceDefault : COLORS.topicDefault,
        emissive: 0x000000,
        shininess: 30
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.copy(positions[id]);
      mesh.userData = { id, type, material };
      scene.add(mesh);
      nodes[id] = mesh;

      const labelDiv = document.createElement('div');
      labelDiv.className = 'node-label';
      labelDiv.textContent = id.length > 24 ? id.substring(0, 22) + '…' : id;
      const label = new THREE.CSS2DObject(labelDiv);
      label.position.set(0, 1.0, 0);
      mesh.add(label);
      mesh.userData.label = label;
      return mesh;
    }

    function createEdge(from, to, edgeType) {
      const fromPos = positions[from];
      const toPos = positions[to];
      if (!fromPos || !toPos) return;
      const points = [fromPos.clone(), toPos.clone()];
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineBasicMaterial({
        color: edgeType === 'produces' ? 0x22c55e : 0x0ea5e9,
        transparent: true,
        opacity: 0.4
      });
      const line = new THREE.Line(geometry, material);
      line.userData = { from, to, edgeType, material };
      scene.add(line);
      edges.push(line);
    }

    // Build graph
    for (const s of ALL_SERVICES) createNode(s, 'service');
    for (const t of ALL_TOPICS) createNode(t, 'topic');
    for (const [svc, topics] of Object.entries(PRODUCERS)) {
      for (const t of topics) {
        if (positions[t]) createEdge(svc, t, 'produces');
      }
    }
    for (const [svc, topics] of Object.entries(CONSUMERS)) {
      for (const t of topics) {
        if (positions[t]) createEdge(t, svc, 'consumes');
      }
    }

    const ambient = new THREE.AmbientLight(0x404040, 0.6);
    scene.add(ambient);
    const light = new THREE.DirectionalLight(0xffffff, 0.8);
    light.position.set(25, 25, 25);
    scene.add(light);

    let selectedNode = null;

    function getProduced() {
      if (!selectedNode) return [];
      const { id, type } = selectedNode.userData;
      if (type === 'service') return PRODUCERS[id] || [];
      return topicProducers[id] || [];
    }

    function getConsumed() {
      if (!selectedNode) return [];
      const { id, type } = selectedNode.userData;
      if (type === 'service') return CONSUMERS[id] || [];
      return topicConsumers[id] || [];
    }

    function getHighlightSet() {
      const produced = getProduced();
      const consumed = getConsumed();
      return new Set([selectedNode.userData.id, ...produced, ...consumed]);
    }

    function updateColors() {
      const highlightSet = selectedNode ? getHighlightSet() : new Set();
      const produced = selectedNode ? getProduced() : [];
      const consumed = selectedNode ? getConsumed() : [];

      for (const [id, mesh] of Object.entries(nodes)) {
        const mat = mesh.userData.material;
        const labelEl = mesh.userData.label?.element;
        const isService = mesh.userData.type === 'service';
        const defaultColor = isService ? COLORS.serviceDefault : COLORS.topicDefault;

        if (!selectedNode) {
          mat.color.setHex(defaultColor);
          mat.emissive.setHex(0x000000);
          if (labelEl) labelEl.style.color = '#e2e8f0';
        } else if (id === selectedNode.userData.id) {
          mat.color.setHex(COLORS.selected);
          mat.emissive.setHex(0x332200);
          if (labelEl) labelEl.style.color = '#fbbf24';
        } else if (produced.includes(id)) {
          mat.color.setHex(COLORS.produces);
          mat.emissive.setHex(0x0a2200);
          if (labelEl) labelEl.style.color = '#4ade80';
        } else if (consumed.includes(id)) {
          mat.color.setHex(COLORS.consumes);
          mat.emissive.setHex(0x001a33);
          if (labelEl) labelEl.style.color = '#38bdf8';
        } else {
          mat.color.setHex(COLORS.dimmed);
          mat.emissive.setHex(0x000000);
          if (labelEl) labelEl.style.color = '#64748b';
        }
      }

      for (const line of edges) {
        const { from, to, material } = line.userData;
        if (!selectedNode) {
          material.color.setHex(0x475569);
          material.opacity = 0.35;
        } else if (highlightSet.has(from) && highlightSet.has(to)) {
          material.opacity = 0.9;
          material.color.setHex(line.userData.edgeType === 'produces' ? 0x22c55e : 0x0ea5e9);
        } else {
          material.color.setHex(0x1e293b);
          material.opacity = 0.08;
        }
      }
    }

    function updateInfoPanel() {
      const selEl = document.getElementById('selected-name');
      const prodEl = document.getElementById('produces-list');
      const consEl = document.getElementById('consumes-list');

      if (!selectedNode) {
        selEl.textContent = '—';
        prodEl.innerHTML = '—';
        consEl.innerHTML = '—';
        return;
      }

      const { id, type } = selectedNode.userData;
      const isService = type === 'service';
      selEl.innerHTML = `<span style="color:${isService ? '#8b5cf6' : '#22c55e'}">${isService ? '●' : '◆'}</span> ${id}`;

      const produced = getProduced();
      const consumed = getConsumed();

      prodEl.innerHTML = produced.length
        ? produced.map(n => `<span class="node-tag produces" data-id="${n}">${n}</span>`).join('')
        : '—';
      consEl.innerHTML = consumed.length
        ? consumed.map(n => `<span class="node-tag consumes" data-id="${n}">${n}</span>`).join('')
        : '—';

      document.querySelectorAll('#info-panel .node-tag').forEach(tag => {
        tag.addEventListener('click', () => selectNode(tag.dataset.id));
      });
    }

    function selectNode(id) {
      selectedNode = nodes[id] || null;
      updateColors();
      updateInfoPanel();
      document.querySelectorAll('#node-list .node-item').forEach(el => {
        el.classList.toggle('active', el.dataset.id === id);
      });
    }

    function renderNodeList(filter) {
      const container = document.getElementById('node-items');
      container.innerHTML = '';
      const items = filter === 'services' ? ALL_SERVICES.map(s => ({ id: s, type: 'service' }))
        : filter === 'topics' ? ALL_TOPICS.map(t => ({ id: t, type: 'topic' }))
        : [...ALL_SERVICES.map(s => ({ id: s, type: 'service' })), ...ALL_TOPICS.map(t => ({ id: t, type: 'topic' }))];
      items.forEach(({ id, type }) => {
        const div = document.createElement('div');
        div.className = `node-item ${type}`;
        div.textContent = id;
        div.dataset.id = id;
        div.addEventListener('click', () => selectNode(id));
        container.appendChild(div);
      });
    }

    renderNodeList('all');

    document.getElementById('filter-all').addEventListener('click', () => {
      document.querySelectorAll('.filter-tabs button').forEach(b => b.classList.remove('active'));
      document.getElementById('filter-all').classList.add('active');
      renderNodeList('all');
    });
    document.getElementById('filter-services').addEventListener('click', () => {
      document.querySelectorAll('.filter-tabs button').forEach(b => b.classList.remove('active'));
      document.getElementById('filter-services').classList.add('active');
      renderNodeList('services');
    });
    document.getElementById('filter-topics').addEventListener('click', () => {
      document.querySelectorAll('.filter-tabs button').forEach(b => b.classList.remove('active'));
      document.getElementById('filter-topics').classList.add('active');
      renderNodeList('topics');
    });

    function onMouseClick(event) {
      if (event.target.closest('#info-panel') || event.target.closest('#node-list')) return;
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const meshes = Object.values(nodes);
      const intersects = raycaster.intersectObjects(meshes);
      if (intersects.length > 0) {
        selectNode(intersects[0].object.userData.id);
      }
    }

    window.addEventListener('click', onMouseClick);
    document.getElementById('clear-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      selectedNode = null;
      updateColors();
      updateInfoPanel();
      document.querySelectorAll('#node-list .node-item').forEach(el => el.classList.remove('active'));
    });

    document.getElementById('auto-rotate-toggle').addEventListener('change', (e) => {
      controls.autoRotate = e.target.checked;
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
