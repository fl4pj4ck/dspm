<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pod Dependencies - Interactive Visualization</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      background: #0d1117;
      color: #c9d1d9;
      overflow: hidden;
    }
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      cursor: grab;
    }
    #canvas-container:active {
      cursor: grabbing;
    }
    #info-panel {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 320px;
      background: rgba(22, 27, 34, 0.95);
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    #info-panel h2 {
      font-size: 14px;
      color: #58a6ff;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #30363d;
    }
    #info-panel .section {
      margin-bottom: 12px;
      font-size: 12px;
    }
    #info-panel .section-title {
      color: #8b949e;
      margin-bottom: 4px;
      font-size: 11px;
      text-transform: uppercase;
    }
    #info-panel .service-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    #info-panel .service-tag {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
    }
    #info-panel .service-tag.impacted {
      background: rgba(244, 63, 94, 0.25);
      color: #fb7185;
      border: 1px solid #f43f5e;
    }
    #info-panel .service-tag.depends-on {
      background: rgba(14, 165, 233, 0.25);
      color: #38bdf8;
      border: 1px solid #0ea5e9;
    }
    #info-panel .service-tag.selected {
      background: rgba(245, 158, 11, 0.3);
      color: #fbbf24;
      border: 1px solid #f59e0b;
    }
    #info-panel .legend {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #30363d;
      font-size: 11px;
      color: #8b949e;
    }
    #info-panel .legend span {
      display: inline-block;
      margin-right: 12px;
      margin-bottom: 4px;
    }
    #info-panel .legend .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }
    #instructions {
      position: fixed;
      bottom: 16px;
      left: 16px;
      font-size: 11px;
      color: #8b949e;
      z-index: 100;
    }
    #instructions kbd {
      background: #21262d;
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid #30363d;
    }
    #service-list {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 220px;
      max-height: calc(100vh - 80px);
      overflow-y: auto;
      background: rgba(22, 27, 34, 0.95);
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px;
      z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    #service-list h3 {
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    #service-list .service-item {
      padding: 6px 10px;
      margin: 2px 0;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.15s;
    }
    #service-list .service-item:hover {
      background: #21262d;
    }
    #service-list .service-item.active {
      background: rgba(245, 158, 11, 0.25);
      color: #fbbf24;
    }
    .node-label {
      font-size: 10px;
      font-weight: 500;
      color: #e2e8f0;
      text-shadow: 0 1px 2px rgba(0,0,0,0.8);
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
    }
    .controls-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .toggle-switch {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #8b949e;
      cursor: pointer;
    }
    .toggle-switch input {
      accent-color: #0ea5e9;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="info-panel">
    <h2>Pod Dependencies</h2>
    <p style="font-size: 11px; color: #8b949e; margin-bottom: 8px;">Click a service to see impact</p>
    <div class="controls-row">
      <button id="clear-btn" style="font-size: 11px; padding: 4px 10px; background: #21262d; border: 1px solid #30363d; color: #8b949e; border-radius: 4px; cursor: pointer;">Clear selection</button>
      <label class="toggle-switch">
        <input type="checkbox" id="auto-rotate-toggle" checked>
        Auto-rotate
      </label>
    </div>
    <div id="selection-info">
      <div class="section">
        <div class="section-title">Selected</div>
        <div id="selected-name">—</div>
      </div>
      <div class="section">
        <div class="section-title">Impacted if this fails (depends on selected)</div>
        <div id="impacted-list" class="service-list">—</div>
      </div>
      <div class="section">
        <div class="section-title">This depends on (upstream)</div>
        <div id="depends-list" class="service-list">—</div>
      </div>
      <div class="legend">
        <span><span class="dot" style="background:#f59e0b"></span> Selected</span>
        <span><span class="dot" style="background:#f43f5e"></span> Impacted</span>
        <span><span class="dot" style="background:#0ea5e9"></span> Dependencies</span>
      </div>
    </div>
  </div>
  <div id="service-list">
    <h3>All Services</h3>
    <div id="service-items"></div>
  </div>
  <div id="instructions">
    <kbd>Drag</kbd> rotate · <kbd>Scroll</kbd> zoom · <kbd>Click</kbd> node or list · Toggle auto-rotate in panel
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.129.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.129.0/examples/js/controls/OrbitControls.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.129.0/examples/js/renderers/CSS2DRenderer.js"></script>
  <script>

    // Dependency graph: service -> [services it depends on]
    const DEPENDENCIES = {
      'agent-edge': ['taxonomy', 'classifier-unstructured', 'flink-jobmanager'],
      'taxonomy': ['classifier-unstructured', 'classifier-structured', 'agent-edge'],
      'classifier-unstructured': ['DS-ml2'],
      'classifier-structured': ['DS-ml2'],
      'gv-pipeline-classification': ['taxonomy', 'regex-service', 'classifier-unstructured', 'connector-structured-data'],
      'ocr-service': ['ceservice'],
      'scan-manager': ['connector-generic', 'scan-data-manager', 'streaming-manager', 'flink-jobmanager'],
      'scan-data-manager': ['trustees-management', 'flink-jobmanager'],
      'connector-generic': [],
      'trustees-management': [],
      'pipeline-manager': ['flink-jobmanager'],
      'regex-service': [],
      'ceservice': [],
      'data-discoverer': ['connector-structured-data'],
      'structured-scan-data-manager': [],
      'streaming-manager': [],
      'data-provisioner': [],
      'webhook-manager': [],
      'connector-structured-data': [],
      'dashboard': ['scan-manager', 'scan-data-manager', 'pipeline-manager', 'taxonomy', 'trustees-management', 'webhook-manager', 'agent-edge', 'analytics-hub'],
      'analytics-hub': [],
      'dataguard': [],
      'flink-jobmanager': []
    };

    // Build reverse map: who depends on this service
    function buildReverseMap() {
      const reverse = {};
      for (const [service, deps] of Object.entries(DEPENDENCIES)) {
        if (!reverse[service]) reverse[service] = [];
        for (const dep of deps) {
          if (!reverse[dep]) reverse[dep] = [];
          if (!reverse[dep].includes(service)) reverse[dep].push(service);
        }
      }
      return reverse;
    }

    const REVERSE_DEPS = buildReverseMap();
    const ALL_SERVICES = [...new Set([...Object.keys(DEPENDENCIES), ...Object.keys(REVERSE_DEPS)])].sort();

    // Populate service list
    const serviceListEl = document.getElementById('service-items');
    ALL_SERVICES.forEach(name => {
      const div = document.createElement('div');
      div.className = 'service-item';
      div.textContent = name;
      div.dataset.service = name;
      div.addEventListener('click', () => selectService(name));
      serviceListEl.appendChild(div);
    });

    // Colors (Paul Tol-inspired, colorblind-friendly palette)
    const COLORS = {
      default: 0x6b7280,   // slate-500
      selected: 0xf59e0b,  // amber-500
      impacted: 0xf43f5e,  // rose-500
      dependsOn: 0x0ea5e9, // sky-500
      dimmed: 0x374151     // slate-700
    };

    // Scene setup
    const THREE = window.THREE;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0d1117);
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 45);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;

    // CSS2D renderer for labels
    const labelRenderer = new THREE.CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.left = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.getElementById('canvas-container').appendChild(labelRenderer.domElement);

    // Node and edge storage
    const nodes = {};
    const edges = [];
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    // Layout: arrange nodes in 3D sphere/circle
    function getNodePositions() {
      const positions = {};
      const count = ALL_SERVICES.length;
      const radius = 18;
      for (let i = 0; i < count; i++) {
        const phi = Math.acos(-1 + (2 * i) / count);
        const theta = Math.sqrt(count * Math.PI) * phi;
        positions[ALL_SERVICES[i]] = new THREE.Vector3(
          radius * Math.cos(theta) * Math.sin(phi),
          radius * Math.sin(theta) * Math.sin(phi),
          radius * Math.cos(phi)
        );
      }
      return positions;
    }

    const positions = getNodePositions();

    // Create node (sphere with label)
    function createNode(name) {
      const geometry = new THREE.SphereGeometry(0.8, 24, 24);
      const material = new THREE.MeshPhongMaterial({
        color: COLORS.default,
        emissive: 0x000000,
        shininess: 30
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.copy(positions[name]);
      mesh.userData = { name, material };
      scene.add(mesh);
      nodes[name] = mesh;

      // Label
      const labelDiv = document.createElement('div');
      labelDiv.className = 'node-label';
      labelDiv.textContent = name;
      const label = new THREE.CSS2DObject(labelDiv);
      label.position.set(0, 1.2, 0);
      mesh.add(label);
      mesh.userData.label = label;

      return mesh;
    }

    // Create edge (line)
    function createEdge(from, to) {
      const fromPos = positions[from];
      const toPos = positions[to];
      if (!fromPos || !toPos) return;
      const points = [fromPos.clone(), toPos.clone()];
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineBasicMaterial({
        color: 0x30363d,
        transparent: true,
        opacity: 0.5
      });
      const line = new THREE.Line(geometry, material);
      line.userData = { from, to, material };
      scene.add(line);
      edges.push(line);
    }

    // Build graph
    for (const name of ALL_SERVICES) {
      createNode(name);
    }
    for (const [from, deps] of Object.entries(DEPENDENCIES)) {
      for (const to of deps) {
        if (ALL_SERVICES.includes(to)) createEdge(from, to);
      }
    }

    // Lighting
    const ambient = new THREE.AmbientLight(0x404040, 0.6);
    scene.add(ambient);
    const light = new THREE.DirectionalLight(0xffffff, 0.8);
    light.position.set(20, 20, 20);
    scene.add(light);

    let selectedService = null;

    function updateColors() {
      const impacted = selectedService ? (REVERSE_DEPS[selectedService] || []) : [];
      const dependsOn = selectedService ? (DEPENDENCIES[selectedService] || []) : [];
      const highlightSet = new Set([selectedService, ...impacted, ...dependsOn]);

      for (const [name, mesh] of Object.entries(nodes)) {
        const mat = mesh.userData.material;
        const labelEl = mesh.userData.label?.element;
        if (!selectedService) {
          mat.color.setHex(COLORS.default);
          mat.emissive.setHex(0x000000);
          if (labelEl) labelEl.style.color = '#e2e8f0';
        } else if (name === selectedService) {
          mat.color.setHex(COLORS.selected);
          mat.emissive.setHex(0x332200);
        } else if (impacted.includes(name)) {
          mat.color.setHex(COLORS.impacted);
          mat.emissive.setHex(0x220000);
        } else if (dependsOn.includes(name)) {
          mat.color.setHex(COLORS.dependsOn);
          mat.emissive.setHex(0x001a33);
        } else {
          mat.color.setHex(COLORS.dimmed);
          mat.emissive.setHex(0x000000);
          if (labelEl) labelEl.style.color = '#64748b';
        }
        if (labelEl && selectedService) {
          if (name === selectedService) labelEl.style.color = '#fbbf24';
          else if (impacted.includes(name)) labelEl.style.color = '#fb7185';
          else if (dependsOn.includes(name)) labelEl.style.color = '#38bdf8';
        }
      }

      for (const line of edges) {
        const { from, to, material } = line.userData;
        if (!selectedService) {
          material.color.setHex(0x475569);
          material.opacity = 0.5;
        } else if (highlightSet.has(from) && highlightSet.has(to)) {
          material.color.setHex(from === selectedService || to === selectedService ? 0x0ea5e9 : 0x64748b);
          material.opacity = 0.85;
        } else {
          material.color.setHex(0x1e293b);
          material.opacity = 0.12;
        }
      }
    }

    function updateInfoPanel() {
      const selEl = document.getElementById('selected-name');
      const impactEl = document.getElementById('impacted-list');
      const depEl = document.getElementById('depends-list');

      if (!selectedService) {
        selEl.textContent = '—';
        impactEl.innerHTML = '—';
        depEl.innerHTML = '—';
        return;
      }

      selEl.textContent = selectedService;
      const impacted = REVERSE_DEPS[selectedService] || [];
      const dependsOn = DEPENDENCIES[selectedService] || [];

      impactEl.innerHTML = impacted.length
        ? impacted.map(s => `<span class="service-tag impacted" data-service="${s}">${s}</span>`).join('')
        : '—';
      depEl.innerHTML = dependsOn.length
        ? dependsOn.map(s => `<span class="service-tag depends-on" data-service="${s}">${s}</span>`).join('')
        : '—';

      document.querySelectorAll('#info-panel .service-tag').forEach(tag => {
        tag.addEventListener('click', () => {
          selectService(tag.dataset.service);
        });
      });
    }

    function selectService(name) {
      selectedService = name;
      updateColors();
      updateInfoPanel();
      document.querySelectorAll('#service-list .service-item').forEach(el => {
        el.classList.toggle('active', el.dataset.service === name);
      });
    }

    function onMouseClick(event) {
      // Ignore clicks on overlay panels - let their own handlers run
      if (event.target.closest('#info-panel') || event.target.closest('#service-list')) {
        return;
      }
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const meshes = Object.values(nodes);
      const intersects = raycaster.intersectObjects(meshes);
      if (intersects.length > 0) {
        const name = intersects[0].object.userData.name;
        selectService(name);
      }
    }

    window.addEventListener('click', onMouseClick);
    document.getElementById('clear-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      selectedService = null;
      updateColors();
      updateInfoPanel();
      document.querySelectorAll('#service-list .service-item').forEach(el => el.classList.remove('active'));
    });

    document.getElementById('auto-rotate-toggle').addEventListener('change', (e) => {
      controls.autoRotate = e.target.checked;
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
